```html
<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>STROYKA BS</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>





    <!-- TOPBAR -->

    <div class="topbar">

        <div class="logo">
            STROYKA BS
        </div>





        <div class="money-block">

            <span>
                БЮДЖЕТ:
            </span>

            <span id="money-value">
                100 000 ₽
            </span>

        </div>





        <div class="role-block">

            <span>
                РОЛЬ:
            </span>

            <span id="role-value">
                НЕ ВЫБРАНА
            </span>

        </div>

    </div>





    <!-- LEFT PANEL -->

    <div class="left-panel">

        <div class="panel-title">
            РОЛИ
        </div>





        <button
            class="role-btn"
            data-role="directors"
        >
            Совет директоров
        </button>





        <button
            class="role-btn"
            data-role="finance"
        >
            Финансы
        </button>





        <button
            class="role-btn"
            data-role="workers"
        >
            Рабочие
        </button>





        <button
            class="role-btn"
            data-role="architects"
        >
            Архитекторы
        </button>





        <button
            class="role-btn"
            data-role="engineers"
        >
            Инженеры
        </button>





        <button
            class="role-btn"
            data-role="housing"
        >
            ЖКХ
        </button>





        <button
            class="role-btn"
            data-role="sales"
        >
            Продажи
        </button>





        <button
            class="role-btn"
            data-role="pr"
        >
            PR
        </button>





        <button
            class="role-btn"
            data-role="hr"
        >
            HR
        </button>





        <div class="panel-divider"></div>





        <button
            id="reset-world-btn"
            class="danger-btn"
        >
            СБРОСИТЬ ИГРУ
        </button>

    </div>





    <!-- WORKERS UI -->

    <div
        class="bottom-toolbar hidden"
        id="build-toolbar"
    >

        <button
            class="build-btn active-build"
            data-type="cube"
        >
            Куб
        </button>





        <button
            class="build-btn"
            data-type="wall"
        >
            Стена
        </button>





        <button
            class="build-btn"
            data-type="roof"
        >
            Крыша
        </button>





        <button
            class="build-btn"
            data-type="window"
        >
            Окно
        </button>





        <button
            class="build-btn"
            data-type="door"
        >
            Дверь
        </button>

    </div>





    <!-- DIRECTORS -->

    <div
        id="directors-ui"
        class="role-screen hidden"
    >

        <div class="screen-card">

            <h1>
                Техническое задание
            </h1>





            <textarea id="director-notes">

Построить жилой квартал:
- 3 жилых дома
- парковка
- зона отдыха
- бюджет: 100 000 ₽
- срок: 15 минут

            </textarea>

        </div>

    </div>





    <!-- FINANCE -->

    <div
        id="finance-ui"
        class="role-screen hidden"
    >

        <div class="screen-card">

            <h1>
                Финансовый отдел
            </h1>





            <div class="finance-grid">

                <div class="finance-item">
                    Куб: 500 ₽
                </div>

                <div class="finance-item">
                    Стена: 800 ₽
                </div>

                <div class="finance-item">
                    Крыша: 1200 ₽
                </div>

                <div class="finance-item">
                    Окно: 300 ₽
                </div>

                <div class="finance-item">
                    Дверь: 600 ₽
                </div>

            </div>





            <div class="finance-actions">

                <button id="add-money-btn">
                    +10 000 ₽
                </button>





                <button id="remove-money-btn">
                    −10 000 ₽
                </button>

            </div>

        </div>

    </div>





    <!-- PR -->

    <div
        id="pr-ui"
        class="role-screen hidden"
    >

        <div class="screen-card pr-layout">

            <div class="pr-left">

                <h2>
                    PR-доска
                </h2>





                <canvas
                    id="pr-canvas"
                    width="500"
                    height="400"
                ></canvas>

            </div>





            <div class="pr-right">

                <h2>
                    PR-кампания
                </h2>





                <textarea id="pr-text">

Жилой квартал будущего.
Современная среда.
Комфорт.
Экология.
Безопасность.

                </textarea>

            </div>

        </div>

    </div>





    <!-- THREE -->

    <script
        type="module"
        src="main.js"
    ></script>

</body>

</html>
```
