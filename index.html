```html
<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Stroyka Business Simulator</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>





    <!-- TOP HUD -->

    <div class="topbar">

        <div class="logo-card">

            <div class="logo-title">
                STROYKA
            </div>

            <div class="logo-subtitle">
                BUSINESS SIMULATOR
            </div>

        </div>





        <div class="hud-group">

            <div class="hud-card">

                <div class="hud-label">
                    БЮДЖЕТ
                </div>

                <div
                    class="hud-value"
                    id="money-value"
                >
                    100 000 ₽
                </div>

            </div>





            <div class="hud-card">

                <div class="hud-label">
                    РОЛЬ
                </div>

                <div
                    class="hud-value"
                    id="role-value"
                >
                    НЕ ВЫБРАНА
                </div>

            </div>

        </div>

    </div>





    <!-- LEFT PANEL -->

    <div class="left-panel">

        <div class="panel-title">
            РОЛИ
        </div>





        <button
            class="role-btn"
            data-role="directors"
        >
            Совет директоров
        </button>

        <button
            class="role-btn"
            data-role="finance"
        >
            Финансы
        </button>

        <button
            class="role-btn"
            data-role="workers"
        >
            Рабочие
        </button>

        <button
            class="role-btn"
            data-role="architects"
        >
            Архитекторы
        </button>

        <button
            class="role-btn"
            data-role="engineers"
        >
            Инженеры
        </button>

        <button
            class="role-btn"
            data-role="housing"
        >
            ЖКХ
        </button>

        <button
            class="role-btn"
            data-role="sales"
        >
            Продажи
        </button>

        <button
            class="role-btn"
            data-role="pr"
        >
            PR
        </button>

        <button
            class="role-btn"
            data-role="hr"
        >
            HR
        </button>





        <div class="panel-divider"></div>





        <button
            id="reset-world-btn"
            class="danger-btn"
        >
            СБРОСИТЬ ИГРУ
        </button>

    </div>





    <!-- BUILD PANEL -->

    <div
        class="bottom-toolbar"
        id="build-toolbar"
    >

        <button
            class="build-btn active-build"
            data-type="cube"
        >
            Куб
        </button>

        <button
            class="build-btn"
            data-type="wall"
        >
            Стена
        </button>

        <button
            class="build-btn"
            data-type="roof"
        >
            Крыша
        </button>

        <button
            class="build-btn"
            data-type="window"
        >
            Окно
        </button>

        <button
            class="build-btn"
            data-type="door"
        >
            Дверь
        </button>

    </div>





    <!-- FINANCE PANEL -->

    <div
        class="finance-panel hidden"
        id="finance-panel"
    >

        <div class="panel-title">
            ФИНАНСЫ
        </div>

        <button id="add-money-btn">
            +10 000 ₽
        </button>

        <button id="remove-money-btn">
            −10 000 ₽
        </button>

    </div>





    <!-- INFO -->

    <div class="help-card">

        ЛКМ — строить<br>
        ПКМ — снести<br><br>

        WASD — камера<br>
        Колесо — зум

    </div>





    <script
        type="module"
        src="main.js"
    ></script>

</body>

</html>
```
